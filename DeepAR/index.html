<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/deepar/js/deepar.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #deepar-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <canvas width="640" height="360" id="deepar-canvas"></canvas>
  <script>
    (async function() {
      const canvas = document.getElementById("deepar-canvas");
      const resizeCanvas = () => {
        // Keep a 3:4 portrait frame to avoid camera crop/zoom on most phones.
        const targetAspect = 3 / 4;
        let cssWidth = window.innerWidth;
        let cssHeight = Math.floor(cssWidth / targetAspect);

        if (cssHeight > window.innerHeight) {
          cssHeight = window.innerHeight;
          cssWidth = Math.floor(cssHeight * targetAspect);
        }

        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = cssWidth + "px";
        canvas.style.height = cssHeight + "px";
        canvas.width = Math.floor(cssWidth * dpr);
        canvas.height = Math.floor(cssHeight * dpr);
      };
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      try {
        const deepAR = await deepar.initialize({
          licenseKey: "0d4c97008d7c059b9c3f087f79f04c9fc54b5774c5d54e3567f769a906d8d92bf4fbf0920209dd5c",
          canvas,
          effect: '../Effects/airforceeffect.deepar',
          additionalOptions: {
            cameraConfig: {
              facingMode: { ideal: "environment" },
              width: { ideal: 640 },
              height: { ideal: 480 },
              resizeMode: "none",
            },
            hint: "footInit",
          },
        });

        const loader = document.getElementById("loader-wrapper");
        if (loader) loader.style.display = "none";

        deepAR.callbacks.onFeetTracked = (leftFoot, rightFoot) => {
          const feetText = document.getElementById("feet-text");
          if ((leftFoot && leftFoot.detected) || (rightFoot && rightFoot.detected)) {
            if (feetText) feetText.style.display = "none";
            deepAR.callbacks.onFeetTracked = undefined;
          }
        };
      } catch (error) {
        console.error("DeepAR initialization failed:", error);
      }
    })();
  </script>
</body>
</html>
