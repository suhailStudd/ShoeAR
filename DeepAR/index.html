<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/deepar/js/deepar.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #deepar-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas width="640" height="360" id="deepar-canvas"></canvas>
  <script>
    (async function() {
      const canvas = document.getElementById("deepar-canvas");
      const resizeCanvas = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      try {
        const deepAR = await deepar.initialize({
          licenseKey: "0d4c97008d7c059b9c3f087f79f04c9fc54b5774c5d54e3567f769a906d8d92bf4fbf0920209dd5c",
          canvas,
          effect: '../Effects/airforceeffect.deepar',
          additionalOptions: {
            cameraConfig: {
              facingMode: "environment",
              aspectRatio: window.innerWidth / window.innerHeight,
              width: { ideal: window.innerWidth },
              height: { ideal: window.innerHeight },
            },
            hint: "footInit",
          },
        });

        const loader = document.getElementById("loader-wrapper");
        if (loader) loader.style.display = "none";

        deepAR.callbacks.onFeetTracked = (leftFoot, rightFoot) => {
          const feetText = document.getElementById("feet-text");
          if ((leftFoot && leftFoot.detected) || (rightFoot && rightFoot.detected)) {
            if (feetText) feetText.style.display = "none";
            deepAR.callbacks.onFeetTracked = undefined;
          }
        };
      } catch (error) {
        console.error("DeepAR initialization failed:", error);
      }
    })();
  </script>
</body>
</html>
